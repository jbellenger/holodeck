name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, such as v1.0.0."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release-tag.outputs.tag }}
      ref: ${{ steps.release-tag.outputs.ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release-tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${INPUT_TAG}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          git fetch --tags --force
          git rev-parse --verify "refs/tags/${release_tag}"

          echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists."
          else
            gh release create "${RELEASE_TAG}" \
              --draft \
              --generate-notes \
              --title "${RELEASE_TAG}" \
              --verify-tag
          fi

  build-native:
    name: Build ${{ matrix.target }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            asset_suffix: linux-x64.tar.gz
          - os: macos-15-intel
            target: macos-x64
            asset_suffix: macos-x64.tar.gz
          - os: macos-15
            target: macos-arm64
            asset_suffix: macos-arm64.tar.gz
          - os: windows-latest
            target: windows-x64
            asset_suffix: windows-x64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Build standalone executable
        run: python scripts/build_executable.py

      - name: Smoke test executable
        if: runner.os != 'Windows'
        shell: bash
        run: ./dist/holodeck --help >/dev/null

      - name: Smoke test executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\dist\holodeck.exe --help | Out-Null

      - name: Package executable
        if: runner.os != 'Windows'
        env:
          ASSET_NAME: holodeck-${{ needs.prepare-release.outputs.tag }}-${{ matrix.asset_suffix }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets package/holodeck
          cp dist/holodeck package/holodeck/holodeck
          chmod +x package/holodeck/holodeck
          tar -czf "release-assets/${ASSET_NAME}" -C package holodeck

      - name: Package executable
        if: runner.os == 'Windows'
        env:
          ASSET_NAME: holodeck-${{ needs.prepare-release.outputs.tag }}-${{ matrix.asset_suffix }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Compress-Archive -Path dist\holodeck.exe -DestinationPath "release-assets\$env:ASSET_NAME" -Force

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          ASSET_NAME: holodeck-${{ needs.prepare-release.outputs.tag }}-${{ matrix.asset_suffix }}
        shell: bash
        run: gh release upload "${RELEASE_TAG}" "release-assets/${ASSET_NAME}" --clobber

  build-pex:
    name: Build PEX
    needs: prepare-release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Build PEX
        run: python scripts/build_pex.py

      - name: Smoke test PEX
        run: python dist/holodeck.pex --help >/dev/null

      - name: Package PEX
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp dist/holodeck.pex "release-assets/holodeck-${RELEASE_TAG}.pex"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        shell: bash
        run: gh release upload "${RELEASE_TAG}" "release-assets/holodeck-${RELEASE_TAG}.pex" --clobber

  publish-release:
    name: Publish release
    needs:
      - prepare-release
      - build-native
      - build-pex
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          is_draft="$(gh release view "${RELEASE_TAG}" --json isDraft --jq '.isDraft')"
          if [[ "${is_draft}" == "true" ]]; then
            gh release edit "${RELEASE_TAG}" --draft=false
          else
            echo "Release ${RELEASE_TAG} is already published."
          fi
